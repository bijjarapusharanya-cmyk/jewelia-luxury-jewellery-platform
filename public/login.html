<!DOCTYPE html>
<html>
<head>
  <title>JEWELIA | Login</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

  <style>

    body {
      margin: 0;
      padding: 0;
      font-family: Poppins, sans-serif;
      background-color: #f8f2e8;
    }

    header {
      background-color: #7b0f2b;
      padding: 20px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: #f5e6c8;
      letter-spacing: 3px;
    }

    nav a {
      text-decoration: none;
      color: #f5e6c8;
      margin-left: 25px;
      font-size: 14px;
    }

    .login-section {
      padding: 120px 20px;
      text-align: center;

      background-image:
        linear-gradient(rgba(248, 242, 232, 0.1), rgba(248, 242, 232, 0.1)),
        url("bg-login.jpeg");

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .login-box {
      background-color: white;
      width: 350px;
      margin: auto;
      padding: 40px;
      border: 1px solid #e3d5c0;
    }

    .login-box h2 {
      font-family: 'Playfair Display', serif;
      color: #7b0f2b;
      margin-bottom: 25px;
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
    }

    .login-box button {
      width: 100%;
      padding: 10px;
      background-color: #7b0f2b;
      color: white;
      border: none;
      cursor: pointer;
    }

    .login-box p {
      margin-top: 15px;
      font-size: 13px;
    }

    footer {
      background-color: #5a0c20;
      color: #f5e6c8;
      text-align: center;
      padding: 20px;
      font-size: 13px;
    }

  </style>
</head>

<body>

  <header>
    <div class="logo">JEWELIA</div>
  </header>

  <div class="login-section">

    <div class="login-box">
      <h2>Login to JEWELIA</h2>

      <form action="/login" method="POST">
    <input type="email" name="email" placeholder="Email Address" required>
    <input type="password" name="password" placeholder="Password" required>
    
    <button type="submit">Login to Jewelia</button>
</form>

      <p>New here? <a href="signup.html">Create an account</a></p>
    </div>

  </div>

  <footer>
    © 2026 JEWELIA. All rights reserved.
  </footer>

</body>
</html>
